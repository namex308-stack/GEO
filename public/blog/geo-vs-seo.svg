<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="GEO vs SEO comparison">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1d1f21"/>
      <stop offset="100%" stop-color="#2a2d30"/>
    </linearGradient>
    <linearGradient id="orange" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF6600"/>
      <stop offset="100%" stop-color="#ff983f"/>
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4a90d9"/>
      <stop offset="100%" stop-color="#6bb3ff"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="80" y="100" fill="#929292" font-family="system-ui,sans-serif" font-size="14" font-weight="600" letter-spacing="2">CONVAUDIT BLOG</text>
  <text x="80" y="180" fill="white" font-family="system-ui,sans-serif" font-size="48" font-weight="800">GEO vs SEO</text>
  <text x="80" y="240" fill="#929292" font-family="system-ui,sans-serif" font-size="22">Why you need both for e-commerce visibility</text>
  <rect x="80" y="300" width="480" height="260" rx="20" fill="#ffffff" opacity="0.04" stroke="#4a90d9" stroke-opacity="0.4" stroke-width="2"/>
  <text x="320" y="360" text-anchor="middle" fill="#6bb3ff" font-family="system-ui,sans-serif" font-size="32" font-weight="800">SEO</text>
  <text x="320" y="400" text-anchor="middle" fill="#929292" font-family="system-ui,sans-serif" font-size="15">Google &amp; Bing rankings</text>
  <text x="120" y="450" fill="#cccccc" font-family="system-ui,sans-serif" font-size="14">" Keywords &amp; backlinks</text>
  <text x="120" y="480" fill="#cccccc" font-family="system-ui,sans-serif" font-size="14">" Crawlability &amp; speed</text>
  <text x="120" y="510" fill="#cccccc" font-family="system-ui,sans-serif" font-size="14">" Ranked search results</text>
  <rect x="640" y="300" width="480" height="260" rx="20" fill="#ffffff" opacity="0.04" stroke="#FF6600" stroke-opacity="0.4" stroke-width="2"/>
  <text x="880" y="360" text-anchor="middle" fill="#FF6600" font-family="system-ui,sans-serif" font-size="32" font-weight="800">GEO</text>
  <text x="880" y="400" text-anchor="middle" fill="#929292" font-family="system-ui,sans-serif" font-size="15">AI assistant citations</text>
  <text x="680" y="450" fill="#cccccc" font-family="system-ui,sans-serif" font-size="14">" Clarity &amp; structured facts</text>
  <text x="680" y="480" fill="#cccccc" font-family="system-ui,sans-serif" font-size="14">" FAQ &amp; schema markup</text>
  <text x="680" y="510" fill="#cccccc" font-family="system-ui,sans-serif" font-size="14">" ChatGPT &amp; Perplexity answers</text>
  <text x="600" y="420" text-anchor="middle" fill="white" font-family="system-ui,sans-serif" font-size="28" font-weight="800">+</text>
